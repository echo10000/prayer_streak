<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome | PrayerStreak PH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #1E3A5F;
            color: white;
            font-family: 'Poppins', sans-serif;
        }
        .onboarding {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem 1.25rem 1.5rem;
        }
        .progress {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.9);
            border-radius: 50%;
        }
        .dot.active {
            background: #F0C040;
            border-color: #F0C040;
        }
        form {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .step {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 0;
        }
        .step.active { display: flex; }
        h1 {
            margin: 1rem 0 0;
            font-size: 2rem;
            line-height: 1.2;
            font-weight: 700;
        }
        p {
            margin: 0.75rem auto 0;
            max-width: 320px;
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            line-height: 1.7;
        }
        .primary-btn {
            width: 100%;
            max-width: 320px;
            min-height: 52px;
            margin-top: 2rem;
            border: 0;
            border-radius: 26px;
            background: #8B6914;
            color: white;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
        }
        .quiet-time {
            width: 100%;
            max-width: 320px;
            margin-top: 1.75rem;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-family: inherit;
        }
        .back-link,
        .skip-link {
            border: 0;
            background: transparent;
            color: rgba(255,255,255,0.78);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .back-link { margin-top: 1rem; }
        .skip-link {
            align-self: center;
            margin-top: auto;
        }
        .focus-options {
            width: 100%;
            max-width: 320px;
            display: grid;
            gap: 10px;
            margin-top: 1.75rem;
        }
        .focus-card {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            color: white;
            padding: 16px 20px;
            cursor: pointer;
            text-align: left;
        }
        .focus-card.selected {
            border-color: #F0C040;
            background: rgba(240,192,64,0.15);
        }
        .focus-card input { display: none; }
        .focus-card strong {
            display: block;
            font-size: 0.95rem;
        }
        .focus-card span {
            display: block;
            margin-top: 2px;
            color: rgba(255,255,255,0.7);
            font-size: 0.78rem;
            line-height: 1.4;
        }
        @media (max-width: 375px) {
            .onboarding { padding-inline: 1rem; }
            h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>
    <main class="onboarding">
        <div class="progress" aria-label="Onboarding progress">
            <span class="dot active" data-dot="1"></span>
            <span class="dot" data-dot="2"></span>
            <span class="dot" data-dot="3"></span>
        </div>

        <form method="post" action="/onboarding/">
            {% csrf_token %}

            <section class="step active" data-step="1">
                <i class="ti ti-cross" style="font-size:64px; color:#F0C040;"></i>
                <h1>Welcome to PrayerStreak PH</h1>
                <p>A daily rhythm of Scripture and prayer,<br>made for Filipinos.</p>
                <button type="button" class="primary-btn" onclick="showStep(2)">Begin my journey</button>
            </section>

            <section class="step" data-step="2">
                <i class="ti ti-clock" style="font-size:48px; color:#F0C040;"></i>
                <h1>When do you want to pray?</h1>
                <p>We'll send you a gentle reminder at this time each day.</p>
                <input id="quiet_time" name="quiet_time" type="time" value="06:00" class="quiet-time" required>
                <button type="button" class="primary-btn" onclick="nextFromTime()">Next</button>
                <button type="button" class="back-link" onclick="showStep(1)">Back</button>
            </section>

            <section class="step" data-step="3">
                <i class="ti ti-heart" style="font-size:48px; color:#F0C040;"></i>
                <h1>What will you pray for?</h1>
                <p>You can change this anytime in settings.</p>
                <div class="focus-options">
                    <label class="focus-card selected">
                        <input type="radio" name="prayer_focus" value="personal" checked>
                        <i class="ti ti-user"></i>
                        <span><strong>Personal</strong>My faith, growth, and daily life</span>
                    </label>
                    <label class="focus-card">
                        <input type="radio" name="prayer_focus" value="family">
                        <i class="ti ti-home"></i>
                        <span><strong>Family</strong>My family and loved ones</span>
                    </label>
                    <label class="focus-card">
                        <input type="radio" name="prayer_focus" value="nation">
                        <i class="ti ti-map-pin"></i>
                        <span><strong>Nation</strong>The Philippines and its people</span>
                    </label>
                    <label class="focus-card">
                        <input type="radio" name="prayer_focus" value="all">
                        <i class="ti ti-infinity"></i>
                        <span><strong>All of the above</strong>Every circle God places before me</span>
                    </label>
                </div>
                <button type="submit" class="primary-btn">Begin my prayer journey</button>
                <button type="button" class="back-link" onclick="showStep(2)">Back</button>
            </section>

            <button type="submit" class="skip-link">Skip for now</button>
        </form>
    </main>

    <script>
        function showStep(step) {
            document.querySelectorAll(".step").forEach(function(panel) {
                panel.classList.toggle("active", panel.dataset.step === String(step));
            });
            document.querySelectorAll(".dot").forEach(function(dot) {
                dot.classList.toggle("active", dot.dataset.dot === String(step));
            });
        }

        function nextFromTime() {
            const quietTime = document.getElementById("quiet_time");
            if (!quietTime.value) {
                quietTime.focus();
                return;
            }
            showStep(3);
        }

        document.querySelectorAll(".focus-card").forEach(function(card) {
            card.addEventListener("click", function() {
                document.querySelectorAll(".focus-card").forEach(function(item) {
                    item.classList.remove("selected");
                });
                card.classList.add("selected");
                card.querySelector("input").checked = true;
            });
        });
    </script>
</body>
</html>
