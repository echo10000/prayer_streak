<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found | PrayerStreak PH</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#1E3A5F; color:white; font-family:'Poppins',sans-serif; padding:1.5rem; text-align:center; }
        .code { color:#F0C040; font-size:5rem; font-weight:500; line-height:1; }
        h1 { margin:1rem 0 0; font-size:2rem; }
        p { color:rgba(255,255,255,0.7); line-height:1.7; }
        .scripture { color:rgba(255,255,255,0.8); font-family:'IM Fell English',serif; font-style:italic; font-size:1.15rem; }
        .actions { display:flex; gap:.75rem; justify-content:center; flex-wrap:wrap; margin-top:1.75rem; }
        a { border-radius:999px; padding:.8rem 1.4rem; text-decoration:none; font-weight:700; }
        .primary { background:#8B6914; color:white; }
        .secondary { border:1px solid white; color:white; }
    </style>
</head>
<body>
    <main>
        <div class="code">404</div>
        <h1>Page not found</h1>
        <p>This page seems to have wandered off. Let's bring you back.</p>
        <p class="scripture">"Your word is a lamp to my feet and a light to my path."<br>— Psalm 119:105</p>
        <div class="actions">
            <a class="primary" href="/">Go home</a>
            <a class="secondary" href="/dashboard/">Go to dashboard</a>
        </div>
    </main>
</body>
</html>
