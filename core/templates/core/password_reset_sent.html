{% extends "base.html" %}

{% block title %}Check Your Email | PrayerStreak PH{% endblock %}

{% block content %}
<section class="mx-auto max-w-md">
    <div class="card-surface p-8 text-center">
        <i class="ti ti-mail" style="font-size:48px;color:#8B6914;"></i>
        <h1 class="mt-4 text-3xl font-extrabold text-ps-blue">Check your email</h1>
        <p class="mt-3 leading-7" style="color:#6B5B3E">If an account exists for that email, we've sent a password reset link. Check your inbox and spam folder.</p>
        <a href="/login/" class="btn-primary mt-6 inline-block">Back to login</a>
    </div>
</section>
{% endblock %}
